<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <!-- Favicon: light mode (default) -->
    <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <!-- Favicon: dark mode -->
    <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/dark-favicon.ico" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/dark-favicon-32x32.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/dark-favicon-16x16.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/dark-apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
        (() => {
            const key = 'nightmare-club-theme';
            const valid = ['poster', 'dark', 'light'];
            const stored = localStorage.getItem(key);
            const theme = valid.includes(stored) ? stored : 'poster';
            const root = document.documentElement;
            root.classList.remove(...valid);
            root.classList.add(theme);
            root.dataset.theme = theme;
        })();
    </script>
    %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
